---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metal3-fkas-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metal3-fkas-role
rules:
- apiGroups: ["metal3.io", "infrastructure.cluster.x-k8s.io"]
  resources: ["baremetalhosts", "metal3machines", "pod"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes", "pods", "services", "endpoints", "persistentvolumeclaims", "events", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metal3-fkas-rolebinding
subjects:
- kind: ServiceAccount
  name: metal3-fkas-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: metal3-fkas-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: metal3-fkas-system
  namespace: default
spec:
  serviceAccountName: metal3-fkas-sa
  containers:
  - name: metal3-fkas-reconciler
    image: quay.io/metal3-io/metal3-fkas:latest
    imagePullPolicy: IfNotPresent
    command: ["/reconciler"]
    env:
    - name: DEBUG
      value: "true"
  - image: quay.io/metal3-io/metal3-fkas:latest
    imagePullPolicy: IfNotPresent
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: DEBUG
      value: "true"
    name: metal3-fkas
