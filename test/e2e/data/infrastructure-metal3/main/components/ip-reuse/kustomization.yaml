apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Add the provisioning IPPool address to the networkData of both the worker
# and control plane Metal3DataTemplates so that the provisioning IP can be
# configured on an interface (enp1s0), instead of only being present in metaData.
# This enables the IP reuse e2e test to resolve the provisioning IPAddress
# and validate it is part of the IPPool allocations.
patches:
- target:
    kind: Metal3DataTemplate
    name: .*-workers-template
  patch: |-
    - op: add
      path: /spec/networkData/networks/ipv4/-
      value:
        id: provisioning
        ipAddressFromIPPool: provisioning-pool
        link: enp1s0
- target:
    kind: Metal3DataTemplate
    name: .*-controlplane-template
  patch: |-
    - op: add
      path: /spec/networkData/networks/ipv4/-
      value:
        id: provisioning
        ipAddressFromIPPool: provisioning-pool
        link: enp1s0
