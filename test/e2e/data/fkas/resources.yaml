apiVersion: v1
kind: ServiceAccount
metadata:
  name: metal3-fkas-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metal3-fkas-role
rules:
- apiGroups: ["metal3.io", "infrastructure.cluster.x-k8s.io"]
  resources: ["baremetalhosts", "metal3machines"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metal3-fkas-rolebinding
subjects:
- kind: ServiceAccount
  name: metal3-fkas-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: metal3-fkas-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: metal3-fkas-system
  namespace: default
spec:
  serviceAccountName: metal3-fkas-sa
  hostNetwork: true
  containers:
  - name: metal3-fkas-reconciler
    image: 192.168.111.1:5000/localimages/api-server
    imagePullPolicy: IfNotPresent
    command: ["/reconciler"]
    env:
    - name: DEBUG
      value: "true"
  - image: 192.168.111.1:5000/localimages/api-server
    imagePullPolicy: IfNotPresent
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: DEBUG
      value: "true"
    name: metal3-fkas